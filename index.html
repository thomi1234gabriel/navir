<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Navir 🐾</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <svg id="favicon-patita" viewBox="0 0 24 24" width="32" height="32" style="display:none;">
  <path fill="#f4ccd8" d="M17.5,7c-1.93,0-3.5,1.57-3.5,3.5c0,0.56,0.14,1.09,0.39,1.56c-0.66,0.22-1.35,0.34-2.07,0.34c-0.72,0-1.41-0.12-2.07-0.34 C10.36,11.59,10.5,11.06,10.5,10.5c0-1.93-1.57-3.5-3.5-3.5S3.5,8.57,3.5,10.5c0,1.38,0.78,2.58,1.93,3.19C5.12,14.65,4.5,16.22,4.5,18 c0,2.76,2.24,5,5,5h6c2.76,0,5-2.24,5-5c0-1.78-0.62-3.35-1.57-4.31C20.22,13.08,21,11.88,21,10.5C21,8.57,19.43,7,17.5,7z"/>
</svg>
</head>
<body>
    <div class="game-container">
        <i class="fa-solid fa-paw decoracion decor-tl"></i>
        <i class="fa-solid fa-heart decoracion decor-br"></i>

        <h1>Press Start, Navir 🐾</h1>
        <p class="subtitle">Selecciona tu nivel...</p>
        
        <div id="contador-amor" class="contador-amor">
            <p>Navir, estamos juntos hace:</p>
            <div id="reloj">Cargando tiempo...</div>
        </div>
        
        <div class="music-card">
            <div class="music-cover">
                ❤️
            </div>
            <div class="music-info">
                <h3>Navir</h3>
                <p>"Cada canción me recuerda a vos"</p>
                <div class="player-controls">
                    <button id="prevBtn">
                        <i class="fa-solid fa-backward"></i>
                    </button>
                    <button id="playBtn">
                        <i class="fa-solid fa-play"></i>
                    </button>
                    <button id="nextBtn">
                        <i class="fa-solid fa-forward"></i>
                    </button>
                </div>
            </div>
        </div>

        <div id="player"></div>
        
     

        <div class="menu-grid">
            <a href="mimo.html" class="btn-game"><i class="fa-solid fa-gift"></i> ¿Necesitás un mimo?</a>
            <a href="mes.html" class="btn-game"><i class="fa-solid fa-calendar-check"></i> 1 Mes</a>
            <a href="cancion.html" class="btn-game"><i class="fa-solid fa-music"></i> Canción</a>
            <a href="recuerdos.html" class="btn-game"><i class="fa-solid fa-camera-retro"></i> Recuerdos</a>
            <a href="juegos.html" class="btn-game"><i class="fa-solid fa-gamepad"></i> Mini Juegos</a>
        </div>
    </div> <!-- Cierre correcto de game-container -->
<script type="module" src="script.js"></script>
</body>
</html>
